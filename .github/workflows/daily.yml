name: daily-crawl

# 每日自動匯整薩提爾活動：重建來源清單 → 逐站爬蟲 → 更新 events.json → 自動 commit。
# 全靜態架構的「每天更新」由本 workflow 完成；GitHub Pages 只讀 events.json 顯示。

on:
  schedule:
    # UTC 21:00 = 台北 05:00，每天清晨跑一次
    - cron: "0 21 * * *"
  workflow_dispatch: {}   # 允許手動觸發（Actions 頁面按鈕）

permissions:
  contents: write          # 需寫回 repo（commit events.json / Satir_source.md）

concurrency:
  group: daily-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      # 步驟 1：重建來源清單（健康檢查 + 結構偵測，不抓活動）
      - name: Rebuild source list
        run: python Py/discover_sources.py
        continue-on-error: true   # 單站連線失敗不應中斷整個 pipeline

      # 步驟 2：逐站爬蟲，各自 merge 進 events.json（任何順序皆 idempotent）
      - name: Crawl shiuhli
        run: python Py/crawlers/shiuhli.py --out
        continue-on-error: true
      - name: Crawl lopwilldo
        run: python Py/crawlers/lopwilldo.py --out
        continue-on-error: true
      - name: Crawl comflow
        run: python Py/crawlers/comflow.py --out
        continue-on-error: true
      - name: Crawl satir_org
        run: python Py/crawlers/satir_org.py --out
        continue-on-error: true
      - name: Crawl omia
        run: python Py/crawlers/omia.py --out
        continue-on-error: true

      # 步驟 3：正規化 Docs/events.json → 根 events.json（前端契約 + price_min）
      - name: Build site events.json
        run: python Py/build_site_json.py

      # 步驟 4：有變動才 commit + push
      - name: Commit changes
        run: |
          git config user.name  "satir-bot"
          git config user.email "satir-bot@users.noreply.github.com"
          git add Docs/events.json Docs/Satir_source.md events.json
          if git diff --cached --quiet; then
            echo "無變動，略過 commit"
          else
            git commit -m "chore: 每日更新薩提爾活動 (events.json)"
            git push
          fi
